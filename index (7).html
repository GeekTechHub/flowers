<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para Ti 🌻</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:   #f5c518;
      --amber:  #e8a000;
      --petal:  #ffd740;
      --deep:   #1a0e00;
      --soil:   #3b2000;
      --green:  #2d5a1b;
      --cream:  #fff8e7;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--deep);
      cursor: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe066 30%, #f5c51880 100%);
      box-shadow: 0 0 18px 6px #ffd74066;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 999;
      transition: transform 0.08s ease;
    }

    /* Message overlay */
    #message {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: var(--cream);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      animation: fadeUp 2s ease 1.8s forwards;
    }

    #message h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      font-weight: 400;
      color: var(--gold);
      text-shadow: 0 0 40px #f5c51855, 0 2px 8px #0008;
      letter-spacing: 0.02em;
    }

    #message p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-weight: 300;
      color: #fff8e7cc;
      margin-top: 8px;
      letter-spacing: 0.08em;
    }

    #hint {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      color: #f5c51866;
      pointer-events: none;
      z-index: 100;
      letter-spacing: 0.12em;
      opacity: 0;
      animation: fadeUp 1.5s ease 3s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div id="cursor"></div>
  <canvas id="c"></canvas>
  <div id="message">
    <h1>Para ti, que iluminas todo</h1>
    <p>como estas flores que no pueden evitar girar hacia tu luz</p>
  </div>
  <div id="hint">mueve el cursor · haz clic para plantar más flores</div>

  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const cursor = document.getElementById('cursor');

    let W = canvas.width  = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    let mouse = { x: W / 2, y: H / 2 };

    window.addEventListener('resize', () => {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initFlowers();
    });

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // ── Gradient sky background ──────────────────────────────────────────
    function drawBg() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0,   '#0a0500');
      grad.addColorStop(0.5, '#1a0e00');
      grad.addColorStop(1,   '#2a1500');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // subtle stars
      ctx.fillStyle = '#fff4d088';
      for (let s of stars) {
        ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(Date.now() * 0.001 + s.p));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ── Stars ────────────────────────────────────────────────────────────
    const stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H * 0.6,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      p: Math.random() * Math.PI * 2,
    }));

    // ── Petals ───────────────────────────────────────────────────────────
    const petals = [];
    function spawnPetal(x, y) {
      petals.push({
        x, y,
        vx: (Math.random() - 0.5) * 2,
        vy: -Math.random() * 1.5 - 0.5,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.1,
        size: Math.random() * 10 + 5,
        life: 1,
        decay: Math.random() * 0.005 + 0.003,
        hue: Math.random() * 30 + 40, // golden yellows
      });
    }
    function updatePetals() {
      for (let i = petals.length - 1; i >= 0; i--) {
        const p = petals[i];
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.04;
        p.vx += (Math.random() - 0.5) * 0.05;
        p.rot += p.rotV;
        p.life -= p.decay;
        if (p.life <= 0) petals.splice(i, 1);
      }
    }
    function drawPetals() {
      for (const p of petals) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.life * 0.85;
        ctx.fillStyle = `hsl(${p.hue}, 100%, 62%)`;
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size * 0.4, p.size, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    // ── Flower ───────────────────────────────────────────────────────────
    class Flower {
      constructor(x, groundY, opts = {}) {
        this.x        = x;
        this.groundY  = groundY;
        this.stemH    = opts.stemH   ?? (Math.random() * 120 + 80);
        this.petalN   = opts.petalN  ?? (Math.random() < 0.5 ? 8 : 12);
        this.petalR   = opts.petalR  ?? (Math.random() * 18 + 18);
        this.coreR    = opts.coreR   ?? (Math.random() * 10 + 10);
        this.hue      = opts.hue     ?? (Math.random() * 25 + 42);
        this.sway     = 0;
        this.swayV    = (Math.random() - 0.5) * 0.002;
        this.swayMax  = 0.18 + Math.random() * 0.12;
        this.bloom    = 0;   // 0→1 animation
        this.phase    = Math.random() * Math.PI * 2;
        this.scale    = opts.scale ?? (0.6 + Math.random() * 0.7);
        this.leafSide = Math.random() < 0.5 ? 1 : -1;
        this.petalSpawn = 0;
      }

      get headX() {
        return this.x + Math.sin(this.sway) * this.stemH * 0.3;
      }
      get headY() {
        return this.groundY - this.stemH * this.scale;
      }

      update(mouse) {
        // sway toward mouse gently
        const dx = mouse.x - this.x;
        const targetSway = Math.max(-this.swayMax, Math.min(this.swayMax, dx * 0.0003));
        this.sway += (targetSway - this.sway) * 0.02;
        this.sway += Math.sin(Date.now() * 0.0008 + this.phase) * 0.0015;

        if (this.bloom < 1) this.bloom = Math.min(1, this.bloom + 0.012);

        // spawn petals occasionally
        if (this.bloom >= 1 && Math.random() < 0.004) {
          spawnPetal(this.headX, this.headY);
        }
      }

      draw(ctx) {
        const hx = this.headX, hy = this.headY;
        const sc = this.scale;

        // stem
        ctx.save();
        ctx.strokeStyle = '#3a6e18';
        ctx.lineWidth   = 3.5 * sc;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(this.x, this.groundY);
        ctx.quadraticCurveTo(
          this.x + Math.sin(this.sway) * this.stemH * 0.5,
          this.groundY - this.stemH * sc * 0.5,
          hx, hy
        );
        ctx.stroke();

        // leaf
        const leafY = this.groundY - this.stemH * sc * 0.45;
        const leafX = this.x + Math.sin(this.sway) * this.stemH * 0.15;
        ctx.save();
        ctx.fillStyle = '#2d5a1b';
        ctx.beginPath();
        ctx.ellipse(
          leafX + 14 * sc * this.leafSide,
          leafY,
          16 * sc, 7 * sc,
          Math.PI * 0.25 * this.leafSide, 0, Math.PI * 2
        );
        ctx.fill();
        ctx.restore();

        // petals
        const n = this.petalN;
        const pr = this.petalR * sc * this.bloom;
        for (let i = 0; i < n; i++) {
          const angle = (i / n) * Math.PI * 2;
          const px = hx + Math.cos(angle) * pr;
          const py = hy + Math.sin(angle) * pr;
          const grad = ctx.createRadialGradient(px, py, 0, hx, hy, pr * 1.8);
          grad.addColorStop(0,   `hsl(${this.hue}, 100%, 78%)`);
          grad.addColorStop(0.5, `hsl(${this.hue - 5}, 100%, 62%)`);
          grad.addColorStop(1,   `hsl(${this.hue - 15}, 95%, 48%)`);
          ctx.save();
          ctx.translate(hx, hy);
          ctx.rotate(angle + Math.sin(Date.now() * 0.001 + this.phase + i) * 0.04);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.ellipse(pr * 0.9, 0, pr * 0.72, pr * 0.32, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // inner ring glow
        const ig = ctx.createRadialGradient(hx, hy, 0, hx, hy, this.coreR * sc * 1.6);
        ig.addColorStop(0,   '#fff0a0');
        ig.addColorStop(0.4, '#f5c518');
        ig.addColorStop(1,   'transparent');
        ctx.globalAlpha = 0.35 * this.bloom;
        ctx.fillStyle = ig;
        ctx.beginPath();
        ctx.arc(hx, hy, this.coreR * sc * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // core
        const cg = ctx.createRadialGradient(hx - 2 * sc, hy - 2 * sc, 0, hx, hy, this.coreR * sc);
        cg.addColorStop(0,   '#5a3200');
        cg.addColorStop(0.6, '#3b2000');
        cg.addColorStop(1,   '#1a0e00');
        ctx.fillStyle = cg;
        ctx.beginPath();
        ctx.arc(hx, hy, this.coreR * sc * this.bloom, 0, Math.PI * 2);
        ctx.fill();

        // core dots
        ctx.fillStyle = '#f5c51888';
        for (let d = 0; d < 7; d++) {
          const da = (d / 7) * Math.PI * 2 + Date.now() * 0.0005;
          ctx.beginPath();
          ctx.arc(
            hx + Math.cos(da) * this.coreR * sc * 0.55,
            hy + Math.sin(da) * this.coreR * sc * 0.55,
            1.5 * sc, 0, Math.PI * 2
          );
          ctx.fill();
        }

        ctx.restore();
      }
    }

    // ── Ground ───────────────────────────────────────────────────────────
    function drawGround() {
      const g = ctx.createLinearGradient(0, H * 0.75, 0, H);
      g.addColorStop(0, '#1a0e00');
      g.addColorStop(1, '#0a0500');
      ctx.fillStyle = g;
      ctx.fillRect(0, H * 0.75, W, H * 0.25);

      // grass blades
      ctx.strokeStyle = '#2d5a1b';
      ctx.lineWidth   = 1.5;
      ctx.lineCap     = 'round';
      for (let b of blades) {
        const sway = Math.sin(Date.now() * 0.001 + b.p) * 6;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.moveTo(b.x, H);
        ctx.quadraticCurveTo(b.x + sway, H - b.h * 0.5, b.x + sway * 1.5, H - b.h);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    const blades = Array.from({ length: 120 }, () => ({
      x: Math.random() * W,
      h: Math.random() * 28 + 8,
      p: Math.random() * Math.PI * 2,
    }));

    // ── Flowers ──────────────────────────────────────────────────────────
    let flowers = [];
    function initFlowers() {
      flowers = [];
      const count = Math.max(5, Math.floor(W / 140));
      for (let i = 0; i < count; i++) {
        const x = (i + 0.5) * (W / count) + (Math.random() - 0.5) * 60;
        const groundY = H * 0.76 + Math.random() * H * 0.02;
        flowers.push(new Flower(x, groundY));
      }
    }
    initFlowers();

    canvas.addEventListener('click', e => {
      const groundY = H * 0.76 + Math.random() * H * 0.02;
      const f = new Flower(e.clientX, groundY);
      f.bloom = 0;
      flowers.push(f);
      // burst of petals
      for (let i = 0; i < 12; i++) spawnPetal(e.clientX, groundY - f.stemH * f.scale);
    });

    // ── Floating particles ───────────────────────────────────────────────
    const particles = Array.from({ length: 30 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -Math.random() * 0.4 - 0.1,
      r:  Math.random() * 2 + 0.5,
      a:  Math.random(),
    }));
    function updateParticles() {
      for (const p of particles) {
        p.x = (p.x + p.vx + W) % W;
        p.y = (p.y + p.vy + H) % H;
      }
    }
    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.a * 0.5 * (0.5 + 0.5 * Math.sin(Date.now() * 0.001 + p.x));
        ctx.fillStyle   = '#f5c518';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ── Render loop ──────────────────────────────────────────────────────
    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawBg();
      drawGround();
      updateParticles();
      drawParticles();
      updatePetals();

      // sort by scale so smaller flowers draw behind
      flowers.sort((a, b) => a.scale - b.scale);
      for (const f of flowers) { f.update(mouse); f.draw(ctx); }

      drawPetals();
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
</body>
</html>
